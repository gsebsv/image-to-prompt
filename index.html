  <script>
    // Safe browser fallback for process.env
    window.process = window.process || {};
    window.process.env = window.process.env || {};

    // Fix for environments (like sandboxed iframes) where window.fetch has only a getter
    // which causes libraries/polyfills attempting to assign to globalThis.fetch to crash.
    (function() {
      try {
        let currentFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get() { return currentFetch; },
          set(v) { currentFetch = v; },
          configurable: true,
          enumerable: true
        });
        
        if (typeof globalThis !== 'undefined' && globalThis !== window) {
          let globalFetch = globalThis.fetch || currentFetch;
          Object.defineProperty(globalThis, 'fetch', {
            get() { return globalFetch; },
            set(v) { globalFetch = v; },
            configurable: true,
            enumerable: true
          });
        }
      } catch (e) {
        console.warn("Failed to patch window.fetch:", e);
      }
    })();
  </script>
